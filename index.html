<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="DarkShop.png">
<title>DarkShop</title>  
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet"><style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1a0026;
}
.box{
  width:94%;
  height:88%;
  display:flex;
  justify-content:center;
  align-items:center;
  border:18px solid #6a00ff;
  outline:4px solid white;
  box-shadow:0 0 25px #b84dff inset, 0 0 40px #8000ff;
  box-sizing:border-box;
  position:relative;
  overflow:hidden;
}
h1{
  position:relative;
  display:inline-block;
  animation: float 6s ease-in-out infinite, shimmer 3s infinite;
  font-family:'Allura', cursive;
  font-size:120px;
  color:#e6ccff;
  text-shadow:
  0 0 10px #b84dff, 
  0 0 20px #b84dff,
  0 0 40px #8000ff;
}
@keyframes float{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-18px); }
  100%{ transform:translateY(0px); }
}
@keyframes shimmer{
  0%,100% { text-shadow: 0 0 10px #b84dff, 0 0 20px #b84dff, 0 0 40px #8000ff; }
  50% { text-shadow: 0 0 20px #ffffff, 0 0 40px #b84dff, 0 0 60px #8000ff; }
}
.snow{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
}
.flake{
  position:absolute;
  width:6px;
  height:6px;
  background:#c77dff;
  border-radius:50%;
  opacity:0.8;
  box-shadow:0 0 6px #c77dff, 0 0 12px #8000ff;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-10px) translateX(0px);}
  50%{transform:translateY(50vh) translateX(15px);}
  100%{transform:translateY(100vh) translateX(-15px);}
}
h1::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-15px;
  width:60%;
  height:4px;
  background:linear-gradient(to right,#b84dff,#ffffff,#b84dff);
  border-radius:4px;
  box-shadow:0 0 10px #b84dff, 0 0 20px #8000ff;
}
.next{
  position:absolute;
  right:25px;
  bottom:25px;
}
.next img{
  width:80px;
  cursor:pointer;
}</style>
</head>



<!--body--> 
<body>
<div class="box">
  <div class="snow"></div>
  <h1>DarkShop</h1>
  <a href="rules.html" class="next">
    <img src="next.png" alt="Next">
  </a>
</div>






<script>
const snow = document.querySelector(".snow");
for(let i=0;i<40;i++){
  const flake = document.createElement("div");
  flake.classList.add("flake");
  flake.style.left = Math.random()*100 + "%";
  flake.style.animationDuration = (15 + Math.random()*15) + "s";
  flake.style.opacity = 0.5 + Math.random()*0.5;
  snow.appendChild(flake);
}
</script>

</body>
</html>
